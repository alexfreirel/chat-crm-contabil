name: Build, Push and Deploy to VPS

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/Dockerfile.backend
            suffix: api
            build-args: APP=api
          - name: worker
            dockerfile: infra/Dockerfile.backend
            suffix: worker
            build-args: APP=worker
          - name: web
            dockerfile: infra/Dockerfile.web
            suffix: web
            build-args: |
              NEXT_PUBLIC_API_URL=https://andrelustosaadvogados.com.br/api
              NEXT_PUBLIC_WS_URL=wss://andrelustosaadvogados.com.br
              NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          # Tag :latest sobrescreve a anterior — sem acúmulo de versões
          tags: andreflustosa/chat-crm-juridico-${{ matrix.suffix }}:latest
          # Cache armazenado no próprio Docker Hub (grátis, não usa storage do GitHub)
          cache-from: type=registry,ref=andreflustosa/chat-crm-juridico-${{ matrix.suffix }}:cache
          cache-to: type=registry,ref=andreflustosa/chat-crm-juridico-${{ matrix.suffix }}:cache,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Portainer stack redeploy
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        run: |
          if [ -z "$PORTAINER_WEBHOOK_URL" ]; then
            echo "PORTAINER_WEBHOOK_URL nao configurada como secret — configure em Settings > Secrets"
            exit 0
          fi
          echo "Disparando webhook do Portainer..."
          curl -s -X POST "$PORTAINER_WEBHOOK_URL" && echo "Webhook disparado com sucesso" || echo "Portainer webhook falhou"
