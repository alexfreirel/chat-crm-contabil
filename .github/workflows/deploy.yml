name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
  workflow_dispatch:  # permite acionar manualmente pelo GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/Dockerfile.backend
            suffix: api
            build-args: APP=api
          - name: worker
            dockerfile: infra/Dockerfile.backend
            suffix: worker
            build-args: APP=worker
          - name: web
            dockerfile: infra/Dockerfile.web
            suffix: web
            build-args: |
              NEXT_PUBLIC_API_URL=https://andrelustosaadvogados.com.br/api
              NEXT_PUBLIC_WS_URL=wss://andrelustosaadvogados.com.br
              NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: andreflustosa/chat-crm-juridico-${{ matrix.suffix }}:latest
          no-cache: true

  # ─── Deploy automático na VPS após todos os builds ───────────────────────
  deploy:
    name: Deploy na VPS
    runs-on: ubuntu-latest
    needs: build-and-push   # só roda após TODOS os builds da matrix concluírem

    steps:
      - name: 🚀 SSH → Pull e atualizar serviços no Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            STACK="lustosaadvogados"

            echo "📦 Pulling novas imagens do Docker Hub..."
            docker pull andreflustosa/chat-crm-juridico-api:latest
            docker pull andreflustosa/chat-crm-juridico-web:latest
            docker pull andreflustosa/chat-crm-juridico-worker:latest

            echo "🔄 Atualizando serviços no Swarm..."
            docker service update \
              --image andreflustosa/chat-crm-juridico-api:latest \
              --with-registry-auth --force ${STACK}_crm-api

            docker service update \
              --image andreflustosa/chat-crm-juridico-web:latest \
              --with-registry-auth --force ${STACK}_crm-web

            docker service update \
              --image andreflustosa/chat-crm-juridico-worker:latest \
              --with-registry-auth --force ${STACK}_crm-worker

            echo "✅ Deploy concluído!"
            docker service ls --format "table {{.Name}}\t{{.Image}}\t{{.Replicas}}" \
              | grep -E "lustosaadvogados_crm|NAME"
