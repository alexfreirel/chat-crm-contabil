name: Build, Push and Deploy to VPS

on:
  push:
    branches:
      - master

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.backend
          build-args: |
            APP=api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Extract metadata for Worker
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.backend
          build-args: |
            APP=worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-web

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}

      # Dispara redeploy automatico no Portainer (se webhook configurado)
      - name: Trigger Portainer stack redeploy
        if: ${{ vars.PORTAINER_WEBHOOK_URL != '' }}
        run: |
          curl -s -X POST "${{ vars.PORTAINER_WEBHOOK_URL }}" || echo "Portainer webhook falhou (stack sera atualizada manualmente)"
