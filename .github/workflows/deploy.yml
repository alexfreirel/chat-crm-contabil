name: Build and Push to Docker Hub

on:
  push:
    branches:
      - master
  workflow_dispatch:  # permite acionar manualmente pelo GitHub UI

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: infra/Dockerfile.backend
            suffix: api
            build-args: APP=api
          - name: worker
            dockerfile: infra/Dockerfile.backend
            suffix: worker
            build-args: APP=worker
          - name: web
            dockerfile: infra/Dockerfile.web
            suffix: web
            build-args: |
              NEXT_PUBLIC_API_URL=https://lexconassessoriacontabil.com.br/api
              NEXT_PUBLIC_WS_URL=wss://lexconassessoriacontabil.com.br
              NEXT_PUBLIC_GTM_ID=${{ vars.NEXT_PUBLIC_GTM_ID }}
          - name: agente-fiscal
            dockerfile: infra/Dockerfile.agente-fiscal
            suffix: agente-fiscal
            build-args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build-args }}
          push: true
          tags: lexconassessoria/chat-crm-contabil-${{ matrix.suffix }}:latest
          no-cache: true

  # ─── Deploy automático via Portainer Webhook ─────────────────────────────
  deploy:
    name: Deploy via Portainer
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: ⚠️ Verificar webhook do Portainer
        id: check
        run: |
          if [ -z "${{ secrets.PORTAINER_WEBHOOK }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::warning::Secret PORTAINER_WEBHOOK não configurado — deploy ignorado. Configure em Settings > Secrets > Actions."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 🚀 Disparar redeploy no Portainer
        if: steps.check.outputs.skip == 'false'
        run: |
          echo "📦 Notificando Portainer para puxar novas imagens..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PORTAINER_WEBHOOK }}")
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Portainer notificado com sucesso! (HTTP $STATUS)"
          else
            echo "⚠️ Portainer retornou HTTP $STATUS — verifique o webhook."
            exit 1
          fi
