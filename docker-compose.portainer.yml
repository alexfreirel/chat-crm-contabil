version: '3.8'

services:
  # ------ Banco de Dados ------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lexcrm}
    networks:\n  OrionNet:\n    external: true\n\nvolumes:
      - pgdata_v2:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    ports:
      - "46379:6379"
    networks:\n  OrionNet:\n    external: true\n\nvolumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ SeaweedFS (Mídias) ------
  seaweed-master:
    image: chrislusf/seaweedfs
    command: "master -ip=seaweed-master -port=9333"
    ports:
      - '49333:9333'
    networks:\n  OrionNet:\n    external: true\n\nvolumes:
      - seaweed_master_data:/data
    deploy:
      restart_policy:
        condition: any

  seaweed-volume:
    image: chrislusf/seaweedfs
    command: "volume -mserver=seaweed-master:9333 -port=8080 -dir=/data"
    ports:
      - '48080:8080'
    networks:\n  OrionNet:\n    external: true\n\nvolumes:
      - seaweed_volume_data:/data
    deploy:
      restart_policy:
        condition: any

  seaweed-filer:
    image: chrislusf/seaweedfs
    command: "filer -master=seaweed-master:9333 -s3"
    ports:
      - '48888:8888'
      - '48333:8333'
    deploy:
      restart_policy:
        condition: any

  # ------ NestJS Core API ------
  crm-api:
    image: ghcr.io/andrelustosa/chat-crm-juridico-api:master
    ports:
      - "${API_PORT:-43001}:3001"
    environment:
      - PORT=3001
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-troque_esta_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
    deploy:
      restart_policy:
        condition: any

  # ------ NestJS Worker (Mídias e IA) ------
  crm-worker:
    image: ghcr.io/andrelustosa/chat-crm-juridico-worker:master
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - S3_ENDPOINT=http://seaweed-filer:8333
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-some_access_key}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-some_secret_key}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    deploy:
      restart_policy:
        condition: any

  # ------ Next.js Frontend ------
  crm-web:
    image: ghcr.io/andrelustosa/chat-crm-juridico-web:master
    networks:
      - default
      - OrionNet
    ports:
      - "${WEB_PORT:-43000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:43001}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:43001}
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.crm-web.rule=Host(`atendimento.andrelustosaadvogados.com.br`)"
        - "traefik.http.services.crm-web.loadbalancer.server.port=3000"
        - "traefik.http.routers.crm-web.entrypoints=websecure"
        - "traefik.http.routers.crm-web.tls.certresolver=letsencrypt" # Mude se o nome do seu resolver for outro

networks:\n  OrionNet:\n    external: true\n\nvolumes:
  pgdata_v2:
  redisdata:
  seaweed_master_data:
  seaweed_volume_data:
