services:
  # ------ Banco de Dados ------
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lexcrm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "46379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------ SeaweedFS (Mídias) ------
  seaweed-master:
    image: chrislusf/seaweedfs
    restart: always
    command: "master -ip=seaweed-master -port=9333"
    ports:
      - '49333:9333'
    volumes:
      - seaweed_master_data:/data

  seaweed-volume:
    image: chrislusf/seaweedfs
    restart: always
    command: "volume -mserver=seaweed-master:9333 -port=8080 -dir=/data"
    depends_on:
      - seaweed-master
    ports:
      - '48080:8080'
    volumes:
      - seaweed_volume_data:/data

  seaweed-filer:
    image: chrislusf/seaweedfs
    restart: always
    command: "filer -master=seaweed-master:9333 -s3"
    depends_on:
      - seaweed-master
      - seaweed-volume
    ports:
      - '48888:8888'
      - '48333:8333'

  # ------ NestJS Core API ------
  crm-api:
    image: ghcr.io/andrelustosa/chat-crm-juridico-api:master
    restart: always
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-troque_esta_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
    depends_on:
      - postgres
      - redis

  # ------ NestJS Worker (Mídias e IA) ------
  crm-worker:
    image: ghcr.io/andrelustosa/chat-crm-juridico-worker:master
    restart: always
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - S3_ENDPOINT=http://seaweed-filer:8333
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-some_access_key}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-some_secret_key}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    depends_on:
      - postgres
      - redis
      - seaweed-filer

  # ------ Next.js Frontend ------
  crm-web:
    image: ghcr.io/andrelustosa/chat-crm-juridico-web:master
    restart: always
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
    depends_on:
      - crm-api

volumes:
  pgdata:
  redisdata:
  seaweed_master_data:
  seaweed_volume_data:
