version: '3.8'

services:
  # ------ Banco de Dados ------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lexcrm}
    networks:
      - default
      - OrionNet
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    ports:
      - "46379:6379"
    networks:
      - default
      - OrionNet
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ MinIO (Mídias S3) ------
  minio:
    image: minio/minio:latest
    command: server /data
    ports:
      - '49000:9000'
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    networks:
      - default
      - OrionNet
    volumes:
      - minio_data:/data
    deploy:
      restart_policy:
        condition: any

  # ------ NestJS Core API ------
  crm-api:
    image: ghcr.io/andrelustosa/chat-crm-juridico-api:master
    ports:
      - "${API_PORT:-43001}:3001"
    environment:
      - PORT=3001
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-troque_esta_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://atendimento.andrelustosaadvogados.com.br/api}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        # --- API router ---
        - "traefik.http.routers.crm-api.rule=Host(`atendimento.andrelustosaadvogados.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.crm-api.service=crm-api"
        - "traefik.http.routers.crm-api.priority=100"
        - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
        - "traefik.http.routers.crm-api.middlewares=strip-api"
        - "traefik.http.services.crm-api.loadbalancer.server.port=3001"
        - "traefik.http.routers.crm-api.entrypoints=websecure"
        - "traefik.http.routers.crm-api.tls.certresolver=letsencrypt"
        # --- WebSocket router ---
        - "traefik.http.routers.crm-ws.rule=Host(`atendimento.andrelustosaadvogados.com.br`) && PathPrefix(`/socket.io`)"
        - "traefik.http.routers.crm-ws.service=crm-ws"
        - "traefik.http.routers.crm-ws.priority=100"
        - "traefik.http.services.crm-ws.loadbalancer.server.port=3001"
        - "traefik.http.routers.crm-ws.entrypoints=websecure"
        - "traefik.http.routers.crm-ws.tls.certresolver=letsencrypt"
        - "traefik.docker.network=OrionNet"

  # ------ NestJS Worker (Mídias e IA) ------
  crm-worker:
    image: ghcr.io/andrelustosa/chat-crm-juridico-worker:master
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any

  # ------ Next.js Frontend ------
  crm-web:
    image: ghcr.io/andrelustosa/chat-crm-juridico-web:master
    networks:
      - default
      - OrionNet
    ports:
      - "${WEB_PORT:-43000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://atendimento.andrelustosaadvogados.com.br/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://atendimento.andrelustosaadvogados.com.br}
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.crm-web.rule=Host(`atendimento.andrelustosaadvogados.com.br`)"
        - "traefik.http.services.crm-web.loadbalancer.server.port=3000"
        - "traefik.http.routers.crm-web.entrypoints=websecure"
        - "traefik.http.routers.crm-web.tls.certresolver=letsencrypt"
        - "traefik.docker.network=OrionNet"

networks:
  OrionNet:
    external: true

volumes:
  pgdata_v2:
  redisdata:
  minio_data:
