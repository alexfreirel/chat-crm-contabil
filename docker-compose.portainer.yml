version: '3.8'

services:
  # ------ Banco de Dados ------
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lexcrm}
    networks:
      - default
      - OrionNet
    volumes:
      - pgdata_v2:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    command: redis-server --stop-writes-on-bgsave-error no --save 900 1 --save 300 100
    ports:
      - "46379:6379"
    networks:
      - default
      - OrionNet
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      restart_policy:
        condition: any

  # ------ MinIO (Midias S3) ------
  # IMPORTANTE: nome unico "crm-minio" para evitar conflito DNS com outros stacks
  # que tambem tenham servico chamado "minio" na mesma rede OrionNet.
  crm-minio:
    image: minio/minio:latest
    command: server /data
    ports:
      - '49000:9000'
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    networks:
      - default
      - OrionNet
    volumes:
      - minio_data:/data
    deploy:
      restart_policy:
        condition: any

  # ------ NestJS Core API ------
  crm-api:
    image: andreflustosa/chat-crm-juridico-api:latest
    ports:
      - "${API_PORT:-43001}:3001"
    environment:
      - PORT=3001
      - TZ=America/Sao_Paulo
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-troque_esta_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-365d}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://andrelustosaadvogados.com.br/api}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://crm-minio:9000}
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - WEBHOOK_HMAC_REQUIRED=${WEBHOOK_HMAC_REQUIRED:-false}
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        # --- API router (main domain) ---
        - "traefik.http.routers.crm-api.rule=Host(`andrelustosaadvogados.com.br`) && PathPrefix(`/api`)"
        - "traefik.http.routers.crm-api.service=crm-api"
        - "traefik.http.routers.crm-api.priority=100"
        - "traefik.http.middlewares.strip-api.stripprefix.prefixes=/api"
        - "traefik.http.routers.crm-api.middlewares=strip-api"
        - "traefik.http.services.crm-api.loadbalancer.server.port=3001"
        - "traefik.http.routers.crm-api.entrypoints=websecure"
        - "traefik.http.routers.crm-api.tls.certresolver=letsencrypt"
        # --- WebSocket router (main domain) ---
        - "traefik.http.routers.crm-ws.rule=Host(`andrelustosaadvogados.com.br`) && PathPrefix(`/socket.io`)"
        - "traefik.http.routers.crm-ws.service=crm-ws"
        - "traefik.http.routers.crm-ws.priority=100"
        - "traefik.http.services.crm-ws.loadbalancer.server.port=3001"
        - "traefik.http.routers.crm-ws.entrypoints=websecure"
        - "traefik.http.routers.crm-ws.tls.certresolver=letsencrypt"
        - "traefik.docker.network=OrionNet"

  # ------ NestJS Worker (Midias e IA) ------
  crm-worker:
    image: andreflustosa/chat-crm-juridico-worker:latest
    environment:
      - PORT=3002
      - TZ=America/Sao_Paulo
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-troque_esta_secret}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-https://andrelustosaadvogados.com.br/api}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://crm-minio:9000}
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    networks:
      - default
      - OrionNet
    deploy:
      restart_policy:
        condition: any

  # ------ Next.js Frontend ------
  crm-web:
    image: andreflustosa/chat-crm-juridico-web:latest
    networks:
      - default
      - OrionNet
    ports:
      - "${WEB_PORT:-43000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://andrelustosaadvogados.com.br/api}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-wss://andrelustosaadvogados.com.br}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://andrelustosaadvogados.com.br}
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        # --- Web (main domain — LP + CRM) ---
        - "traefik.http.routers.crm-web.rule=Host(`andrelustosaadvogados.com.br`)"
        - "traefik.http.services.crm-web.loadbalancer.server.port=3000"
        - "traefik.http.routers.crm-web.entrypoints=websecure"
        - "traefik.http.routers.crm-web.tls.certresolver=letsencrypt"
        # --- Redirect old atendimento subdomain → new path ---
        - "traefik.http.routers.crm-web-old.rule=Host(`atendimento.andrelustosaadvogados.com.br`)"
        - "traefik.http.routers.crm-web-old.entrypoints=websecure"
        - "traefik.http.routers.crm-web-old.tls.certresolver=letsencrypt"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.regex=^https://atendimento\\.andrelustosaadvogados\\.com\\.br/(.*)"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.replacement=https://andrelustosaadvogados.com.br/atendimento/$${1}"
        - "traefik.http.middlewares.redirect-atendimento.redirectregex.permanent=true"
        - "traefik.http.routers.crm-web-old.middlewares=redirect-atendimento"
        - "traefik.docker.network=OrionNet"

networks:
  OrionNet:
    external: true

volumes:
  pgdata_v2:
  redisdata:
  minio_data:
