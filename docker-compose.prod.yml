services:
  # ------ Banco de Dados ------
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lexcrm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "45432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm_user}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "46379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ------ MinIO (Mídias S3) ------
  minio:
    image: minio/minio:latest
    command: server /data
    restart: always
    ports:
      - "49000:9000"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data

  # ------ NestJS Core API ------
  crm-api:
    image: andreflustosa/chat-crm-juridico-api:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
      args:
        APP: api
    restart: always
    ports:
      - "${API_PORT:-43001}:3001"
    environment:
      - PORT=3001
      - RUN_MIGRATIONS=true
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-troque_esta_secret}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-365d}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:43001/api}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - WEBHOOK_HMAC_REQUIRED=${WEBHOOK_HMAC_REQUIRED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ------ NestJS Worker ------
  crm-worker:
    image: andreflustosa/chat-crm-juridico-worker:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
      args:
        APP: worker
    restart: always
    environment:
      - PORT=3002
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-troque_esta_secret}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:43001/api}
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ------ Next.js Frontend ------
  crm-web:
    image: andreflustosa/chat-crm-juridico-web:latest
    build:
      context: .
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:43001/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:43001}
    restart: always
    ports:
      - "${WEB_PORT:-43000}:3000"
    depends_on:
      - crm-api

volumes:
  pgdata:
  redisdata:
  minio_data:
