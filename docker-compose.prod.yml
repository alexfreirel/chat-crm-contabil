version: '3.8'

services:
  # ------ Banco de Dados ------
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-lexcrm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ------ Redis (Filas e Cache) ------
  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  # ------ SeaweedFS (Mídias) ------
  seaweed-master:
    image: chrislusf/seaweedfs
    command: "master -ip=seaweed-master -port=9333"
    ports:
      - '9333:9333'
    volumes:
      - seaweed_master_data:/data

  seaweed-volume:
    image: chrislusf/seaweedfs
    command: "volume -mserver=seaweed-master:9333 -port=8080 -dir=/data"
    depends_on:
      - seaweed-master
    ports:
      - '8080:8080'
    volumes:
      - seaweed_volume_data:/data

  seaweed-filer:
    image: chrislusf/seaweedfs
    command: "filer -master=seaweed-master:9333 -s3"
    depends_on:
      - seaweed-master
      - seaweed-volume
    ports:
      - '8888:8888'
      - '8333:8333'

  # ------ NestJS Core API ------
  crm-api:
    build: 
      context: ..
      dockerfile: infra/Dockerfile.backend
      args:
        APP: api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-sua_secret_super_forte_aqui}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
    depends_on:
      - postgres
      - redis

  # ------ NestJS Worker (Mídias e IA) ------
  crm-worker:
    build: 
      context: ..
      dockerfile: infra/Dockerfile.backend
      args:
        APP: worker
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-crm_user}:${POSTGRES_PASSWORD:-crm_pass}@postgres:5432/${POSTGRES_DB:-lexcrm}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - EVOLUTION_API_URL=${EVOLUTION_API_URL}
      - EVOLUTION_GLOBAL_APIKEY=${EVOLUTION_GLOBAL_APIKEY}
      - EVOLUTION_INSTANCE_NAME=${EVOLUTION_INSTANCE_NAME}
      - S3_ENDPOINT=http://seaweed-filer:8333
      - S3_REGION=us-east-1
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-some_access_key}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-some_secret_key}
      - S3_BUCKET=${S3_BUCKET:-chat-crm-media}
    depends_on:
      - redis
      - postgres
      - seaweed-filer

  # ------ Next.js Frontend ------
  crm-web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://crm-api:3001 # Usar URL pública se for por Traefik/Nginx, ou assim internamente
    depends_on:
      - crm-api

volumes:
  pgdata:
  redisdata:
  seaweed_master_data:
  seaweed_volume_data:
