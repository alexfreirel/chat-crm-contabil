version: "3.9"

# ============================================================
# LexCRM — Stack completa para Portainer
# Imagens publicadas no Docker Hub (andreflustosa/*)
# ============================================================

services:
  # ── Infraestrutura ────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chat_crm
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - crm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chat_crm"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: crm-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - crm-net

  minio:
    image: minio/minio:latest
    container_name: crm-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"   # Console MinIO (acesso externo opcional)
    volumes:
      - minio-data:/data
    networks:
      - crm-net

  # ── Aplicações ────────────────────────────────────────────
  api:
    image: andreflustosa/chat-crm-juridico-api:latest
    container_name: crm-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chat_crm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      JWT_SECRET: troque_esta_chave_jwt_secreta_por_algo_seguro
      JWT_EXPIRES_IN: "365d"
      PORT: "3005"
      RUN_MIGRATIONS: "true"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: chat-crm-media
    ports:
      - "3005:3005"
    networks:
      - crm-net

  worker:
    image: andreflustosa/chat-crm-juridico-worker:latest
    container_name: crm-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chat_crm
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: chat-crm-media
    networks:
      - crm-net

  web:
    image: andreflustosa/chat-crm-juridico-web:latest
    container_name: crm-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - crm-net

networks:
  crm-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  minio-data:
